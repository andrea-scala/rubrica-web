{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{{ 'Modifica contatto' if persona.id else 'Nuovo contatto' }}</h4>
            </div>
            <div class="card-body">
                <form action="/salva" method="POST">
                    <input type="hidden" name="id" value="{{ persona.id or '' }}">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" name="nome" class="form-control" value="{{ persona.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cognome</label>
                        <input type="text" name="cognome" class="form-control" value="{{ persona.cognome }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Indirizzo</label>
                        <input type="text" name="indirizzo" class="form-control" value="{{ persona.indirizzo }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ persona.telefono }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Età</label>
                        <input type="number" name="eta" class="form-control" value="{{ persona.eta }}" min="0" max="120">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">SALVA</button>
                        <a href="/lista" class="btn btn-secondary">ANNULLA</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
